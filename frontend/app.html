<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DevisPro CI</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1A3A5C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DevisPro">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:       #1A3A5C;
      --blue-light: #2A5A8C;
      --gold:       #C9952B;
      --gold-light: #F0B84A;
      --bg:         #F0F4F8;
      --white:      #FFFFFF;
      --dark:       #1C1C1C;
      --gray:       #8A97A8;
      --bubble-bot: #FFFFFF;
      --bubble-user:#1A3A5C;
      --radius:     16px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif; }
    #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

    /* HEADER */
    header { background: var(--blue); padding: 14px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.25); }
    .header-logo { width: 36px; height: 36px; border-radius: 10px; background: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; color: var(--white); flex-shrink: 0; }
    .header-info { flex: 1; }
    .header-name { color: var(--white); font-weight: 700; font-size: 16px; line-height: 1.2; }
    .header-sub  { color: rgba(255,255,255,0.6); font-size: 11px; margin-top: 1px; }
    .header-btn  { background: rgba(255,255,255,0.12); border: none; border-radius: 8px; color: var(--white); padding: 6px 10px; font-size: 12px; cursor: pointer; transition: background 0.15s; }
    .header-btn:hover { background: rgba(255,255,255,0.2); }

    /* PROGRESS */
    #progress-bar { background: rgba(255,255,255,0.15); height: 3px; flex-shrink: 0; }
    #progress-fill { height: 100%; background: var(--gold); transition: width 0.5s ease; width: 0%; }

    /* CHAT */
    #chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: #CBD5E0; border-radius: 2px; }

    .msg { display: flex; gap: 8px; max-width: 88%; animation: fadeUp 0.2s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .msg.bot  { align-self: flex-start; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; background: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 14px; margin-top: auto; }
    .msg.user .msg-avatar { background: var(--gold); }
    .msg-bubble { padding: 10px 14px; border-radius: var(--radius); font-size: 14px; line-height: 1.5; max-width: 100%; white-space: pre-wrap; }
    .msg.bot  .msg-bubble { background: var(--bubble-bot); color: var(--dark); border-bottom-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .msg.user .msg-bubble { background: var(--bubble-user); color: var(--white); border-bottom-right-radius: 4px; }

    /* TYPING */
    .typing { display: flex; align-items: center; gap: 4px; padding: 12px 14px; }
    .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--gray); animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-6px); } }

    /* QUICK REPLIES */
    #quick-replies { padding: 8px 16px; display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }
    .qr-btn { background: var(--white); border: 1.5px solid var(--blue); color: var(--blue); padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .qr-btn:hover, .qr-btn:active { background: var(--blue); color: var(--white); }

    /* VOICE CONFIRM */
    #voice-confirm { display: none; flex-direction: column; gap: 8px; background: #EEF4FA; border-top: 2px solid var(--gold); padding: 10px 16px; flex-shrink: 0; }
    .vc-label { font-size: 11px; color: var(--gray); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .vc-text  { font-size: 15px; color: var(--dark); font-style: italic; }
    .vc-btns  { display: flex; gap: 8px; }
    .vc-btn { flex: 1; padding: 9px; border-radius: 10px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
    .vc-btn.yes { background: var(--blue); color: var(--white); }
    .vc-btn.no  { background: var(--white); color: var(--dark); border: 1.5px solid #CBD5E0; }
    .vc-btn:hover { opacity: 0.85; }

    /* INPUT ZONE */
    #input-zone { background: var(--white); border-top: 1px solid #E2E8F0; padding: 10px 12px; padding-bottom: calc(10px + var(--safe-bottom)); display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; }
    #msg-input { flex: 1; border: 1.5px solid #CBD5E0; border-radius: 22px; padding: 10px 16px; font-size: 15px; outline: none; resize: none; max-height: 100px; line-height: 1.4; font-family: inherit; transition: border-color 0.15s; background: var(--bg); }
    #msg-input:focus { border-color: var(--blue); background: var(--white); }

    /* Bouton micro */
    #mic-btn { width: 44px; height: 44px; border-radius: 50%; border: 1.5px solid #CBD5E0; background: var(--bg); color: var(--dark); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 20px; transition: all 0.15s; }
    #mic-btn:hover { background: #E2E8F0; }
    #mic-btn.listening { background: #FFE4E4; border-color: #E53E3E; color: #E53E3E; animation: pulse-mic 1s infinite; }
    @keyframes pulse-mic { 0%,100% { box-shadow:0 0 0 0 rgba(229,62,62,0.3); } 50% { box-shadow:0 0 0 8px rgba(229,62,62,0); } }

    /* Bouton caméra */
    #camera-btn { width: 44px; height: 44px; border-radius: 50%; border: 1.5px solid #CBD5E0; background: var(--bg); color: var(--dark); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 20px; transition: all 0.15s; }
    #camera-btn:hover { background: #E2E8F0; }
    #camera-btn.analyzing { background: #EBF8FF; border-color: #3182CE; color: #3182CE; animation: pulse-cam 1s infinite; }
    @keyframes pulse-cam { 0%,100% { box-shadow:0 0 0 0 rgba(49,130,206,0.3); } 50% { box-shadow:0 0 0 8px rgba(49,130,206,0); } }

    #send-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: var(--blue); color: var(--white); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 18px; transition: background 0.15s, transform 0.1s; }
    #send-btn:hover  { background: var(--blue-light); }
    #send-btn:active { transform: scale(0.94); }
    #send-btn:disabled { background: #CBD5E0; cursor: not-allowed; }

    /* DEVIS CARD */
    .devis-card { background: linear-gradient(135deg, var(--blue), var(--blue-light)); color: var(--white); border-radius: var(--radius); padding: 16px; margin: 4px 0; box-shadow: 0 4px 16px rgba(26,58,92,0.3); }
    .devis-card-title   { font-weight: 700; font-size: 13px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.5px; }
    .devis-card-total   { font-size: 26px; font-weight: 800; margin: 4px 0; }
    .devis-card-sub     { font-size: 12px; opacity: 0.7; }
    .devis-card-actions { display: flex; gap: 8px; margin-top: 12px; }
    .card-btn { flex: 1; padding: 8px; border-radius: 8px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
    .card-btn:hover { opacity: 0.85; }
    .card-btn.primary   { background: var(--gold); color: var(--white); }
    .card-btn.secondary { background: rgba(255,255,255,0.15); color: var(--white); }

    /* INSTALL BANNER */
    #install-banner { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--blue); color: var(--white); padding: 14px 16px; z-index: 100; box-shadow: 0 -4px 16px rgba(0,0,0,0.2); flex-direction: row; align-items: center; gap: 12px; }
    #install-banner.show { display: flex; }
    .install-text { flex: 1; font-size: 13px; }
    .install-text strong { display: block; font-size: 14px; }
    .install-btn   { background: var(--gold); color: var(--white); border: none; border-radius: 8px; padding: 8px 16px; font-weight: 700; font-size: 13px; cursor: pointer; flex-shrink: 0; }
    .install-close { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 20px; cursor: pointer; padding: 0 4px; }

    /* NAV */
    #nav { background: var(--white); border-top: 1px solid #E2E8F0; display: none; flex-shrink: 0; }
    #nav.visible { display: flex; }
    .nav-item { flex: 1; padding: 8px 4px; display: flex; flex-direction: column; align-items: center; gap: 3px; border: none; background: none; cursor: pointer; color: var(--gray); font-size: 10px; transition: color 0.15s; }
    .nav-item.active, .nav-item:hover { color: var(--blue); }
    .nav-icon { font-size: 20px; }

    /* AUTH */
    #auth-screen { position: fixed; inset: 0; background: var(--blue); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; z-index: 50; }
    .auth-logo  { width: 72px; height: 72px; border-radius: 20px; background: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 800; color: var(--white); margin-bottom: 16px; }
    .auth-title { color: var(--white); font-size: 28px; font-weight: 800; text-align: center; }
    .auth-sub   { color: rgba(255,255,255,0.6); font-size: 14px; margin-top: 6px; text-align: center; }
    .auth-form  { width: 100%; max-width: 360px; margin-top: 32px; display: flex; flex-direction: column; gap: 12px; }
    .auth-input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1.5px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: var(--white); font-size: 15px; outline: none; font-family: inherit; }
    .auth-input::placeholder { color: rgba(255,255,255,0.4); }
    .auth-input:focus { border-color: var(--gold); background: rgba(255,255,255,0.15); }
    .auth-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--gold); color: var(--white); font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: opacity 0.15s; }
    .auth-btn:hover { opacity: 0.9; }
    .auth-toggle { color: rgba(255,255,255,0.6); font-size: 13px; text-align: center; margin-top: 12px; cursor: pointer; }
    .auth-toggle span { color: var(--gold-light); font-weight: 600; }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-logo">D</div>
  <div class="auth-title">DevisPro CI</div>
  <div class="auth-sub">Tes devis professionnels en 2 minutes</div>
  <div class="auth-form">
    <input class="auth-input" id="auth-tel"    type="tel"      placeholder="Numéro de téléphone">
    <input class="auth-input" id="auth-pass"   type="password" placeholder="Mot de passe">
    <div id="register-fields" style="display:none; flex-direction:column; gap:12px;">
      <input class="auth-input" id="auth-nom"    type="text" placeholder="Ton nom complet">
      <input class="auth-input" id="auth-metier" type="text" placeholder="Ton métier (ex: Carreleur)">
    </div>
    <button class="auth-btn" id="auth-submit-btn" onclick="submitAuth()">Se connecter</button>
    <div class="auth-toggle" id="auth-toggle-link">
      Pas encore inscrit ? <span onclick="toggleAuthMode()">Créer un compte</span>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;">
  <header>
    <div class="header-logo">D</div>
    <div class="header-info">
      <div class="header-name">DevisPro CI</div>
      <div class="header-sub" id="header-sub">Prêt à créer un devis</div>
    </div>
    <button class="header-btn" onclick="newDevis()">+ Nouveau</button>
  </header>

  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="chat"></div>
  <div id="quick-replies"></div>

  <!-- Confirmation vocale -->
  <div id="voice-confirm">
    <div class="vc-label">🎤 Tu as dit :</div>
    <div class="vc-text" id="voice-confirm-text"></div>
    <div class="vc-btns">
      <button class="vc-btn yes" onclick="confirmVoice(true)">✅ Oui, envoyer</button>
      <button class="vc-btn no"  onclick="confirmVoice(false)">🔄 Non, recommencer</button>
    </div>
  </div>

  <div id="input-zone">
    <button id="mic-btn"    onclick="toggleMic()"      title="Parler">🎤</button>
    <button id="camera-btn" onclick="Camera.open()"    title="Photo / Scan document">📷</button>
    <textarea id="msg-input" rows="1" placeholder="Tape, parle ou prends une photo..."
              onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>

  <nav id="nav" class="visible">
    <button class="nav-item active" onclick="showTab('chat')">
      <span class="nav-icon">💬</span> Bot
    </button>
    <button class="nav-item" onclick="showTab('devis')">
      <span class="nav-icon">📋</span> Devis
    </button>
    <button class="nav-item" onclick="showTab('profil')">
      <span class="nav-icon">👤</span> Profil
    </button>
  </nav>
</div>

<!-- INSTALL BANNER -->
<div id="install-banner">
  <div class="install-text">
    <strong>Installer DevisPro CI</strong>
    Accès rapide depuis ton écran d'accueil
  </div>
  <button class="install-btn" onclick="installPWA()">Installer</button>
  <button class="install-close" onclick="dismissInstall()">✕</button>
</div>

<script src="/js/config.js"></script>
<script src="/js/api.js"></script>
<script src="/js/bot.js"></script>
<script src="/js/camera.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
